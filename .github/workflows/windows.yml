name: Windows build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SteamImport.sln

      - name: Build
        run: dotnet build SteamImport.sln --configuration Release --no-restore

      - name: Install Playwright Chromium
        shell: pwsh
        run: tests/SteamImport.Web.Tests/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Test
        run: dotnet test SteamImport.sln --configuration Release --no-build

      - name: Publish portable Windows application
        run: >-
          dotnet publish src/SteamImport.App/SteamImport.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output artifacts/publish
          -p:PublishSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Verify true single-file package
        shell: pwsh
        run: |
          $files = @(Get-ChildItem artifacts/publish -File)
          if ($files.Count -ne 1 -or $files[0].Name -ne 'SteamImport.exe') {
            throw "Expected only SteamImport.exe, found: $($files.Name -join ', ')"
          }

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path artifacts/publish/* -DestinationPath artifacts/SteamImport-win-x64.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: SteamImport-win-x64
          path: artifacts/SteamImport-win-x64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-test-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: SteamImport-win-x64
          path: artifacts

      - name: Generate checksum
        working-directory: artifacts
        run: sha256sum SteamImport-win-x64.zip > SHA256SUMS.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          artifacts/SteamImport-win-x64.zip
          artifacts/SHA256SUMS.txt
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --generate-notes
          --latest
          --title "Steam Import ${GITHUB_REF_NAME}"
